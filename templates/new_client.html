<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Client</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <main class="container">
      <h1>Add Client</h1>
      <nav class="links">
        <a href="{{ url_for('survey') }}">Back to survey</a>
        <a href="{{ url_for('clients') }}">View clients</a>
      </nav>

      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}

      <form method="post" class="survey-form">
        <label for="name">Client Name</label>
        <input id="name" name="name" type="text" value="{{ previous.get('name', '') }}" required />

        <label for="email">Client Email</label>
        <input id="email" name="email" type="email" value="{{ previous.get('email', '') }}" required />

        <button type="submit">Save Client</button>
      </form>
    </main>
  </body>
</html>
